<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="30" fill="#4d6b52"/>
  <g transform="translate(90,90)">
    <!-- Burrito wrap (outer) -->
    <ellipse cx="0" cy="6" rx="52" ry="38" fill="#f5e6c8" stroke="#d4a574" stroke-width="2.5"/>
    <!-- Tortilla fold line -->
    <path d="M-38,-10 Q0,-28 38,-10" fill="none" stroke="#d4a574" stroke-width="2" stroke-linecap="round"/>
    <!-- Filling peeking out top -->
    <ellipse cx="-10" cy="-8" rx="9" ry="6" fill="#e05c5c" opacity="0.85"/>
    <ellipse cx="10" cy="-6" rx="8" ry="5.5" fill="#85a389" opacity="0.85"/>
    <ellipse cx="0" cy="-2" rx="7" ry="4.5" fill="#f4b4b4" opacity="0.7"/>
    <!-- Wrap bottom fold -->
    <path d="M-28,26 Q0,44 28,26" fill="none" stroke="#d4a574" stroke-width="2" stroke-linecap="round"/>
    <!-- Sparkle -->
    <g transform="translate(30,-26)" fill="#f4f7f4" opacity="0.9">
      <polygon points="0,-7 1.8,-1.8 7,0 1.8,1.8 0,7 -1.8,1.8 -7,0 -1.8,-1.8"/>
    </g>
  </g>
  <text x="90" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#f4f7f4">OB</text>
</svg>
